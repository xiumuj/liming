const SUN_POS = new THREE.Vector3(7.34, 2.93, -1.27); // 夏至太阳位置（北极圈极昼）

// ── Texture helpers ────────────────────────────────────────
function loadImgEl(id) {
  const el = document.getElementById(id);
  if (!el) return Promise.reject('no element');
  if (el.complete && el.naturalWidth > 0) return Promise.resolve(el);
  return el.decode().then(() => el).catch(() => null);
}
function fallbackTex(color) {
  const c = document.createElement('canvas'); c.width = 4; c.height = 4;
  const x = c.getContext('2d'); x.fillStyle = color; x.fillRect(0,0,4,4);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

// ── Shaders (WebGL2 compatible — use `texture` not `texture2D`) ──
const earthVS = `
  varying vec3 vNormal;
  varying vec2 vUv;
  void main() {
    vUv = uv;
    vNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const earthFS = `
  uniform sampler2D dayTex;
  uniform sampler2D specTex;
  uniform vec3 sunDir;
  uniform vec3 nightCol;

  varying vec3 vNormal;
  varying vec2 vUv;

  void main() {
    vec3 N = normalize(vNormal);
    float ca = dot(N, normalize(sunDir));

    // Day/night blend
    float dayFactor = smoothstep(-0.08, 0.08, ca);

    vec3 texColor = texture(dayTex, vUv).rgb;
    // Non-linear brightening: lift dark pixels (forest) more than bright pixels (desert)
    texColor = pow(texColor, vec3(0.8));
    float specVal = texture(specTex, vUv).r;

    // Day side
    vec3 dayCol = texColor * (1.05 + 0.3 * specVal);

    // Night side
    vec3 nightColOut = nightCol + texColor * 0.035;
    nightColOut += vec3(0.15, 0.12, 0.05) * max(0.0, 1.0 - specVal - 0.5) * 0.12;

    vec3 color = mix(nightColOut, dayCol, dayFactor);

    // Terminator glow
    float glow = clamp(1.0 - abs(ca) * 14.0, 0.0, 1.0);
    glow = glow * glow;
    vec3 glowCol = mix(
      vec3(1.0, 0.5, 0.15),
      vec3(1.0, 0.25, 0.08),
      smoothstep(-0.08, 0.08, ca)
    );
    color += glowCol * glow * 0.4;

    // Atmosphere rim
    float rim = pow(1.0 - abs(ca), 2.0);
    color += vec3(0.15, 0.4, 0.85) * rim * 0.04;

    gl_FragColor = vec4(color, 1.0);
  }
`;

  // ── Sun ──
  function makeSunTex() {
    const c = document.createElement('canvas'); c.width = 512; c.height = 512;
    const x = c.getContext('2d');
    const g = x.createRadialGradient(256,256,40, 256,256,256);
    g.addColorStop(0, 'rgba(255,252,240,1)');
    g.addColorStop(0.25, 'rgba(255,220,100,1)');
    g.addColorStop(0.45, 'rgba(255,180,50,1)');
    g.addColorStop(0.65, 'rgba(255,120,20,1)');
    g.addColorStop(0.80, 'rgba(200,80,10,0.6)');
    g.addColorStop(0.90, 'rgba(150,50,5,0.2)');
    g.addColorStop(0.95, 'rgba(80,30,0,0.05)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = g; x.fillRect(0,0,512,512);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }
  const sunMat = new THREE.MeshBasicMaterial({ 
    map: makeSunTex(), 
    transparent: true, 
    depthWrite: false 
  });
  const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 64, 48), sunMat);
  sunMesh.position.copy(SUN_POS); scene.add(sunMesh);

  // Sun glow canvas
  function makeGlow(rgba, sz, op) {
    const cv = document.createElement('canvas'); cv.width = 128; cv.height = 128;
    const cx = cv.getContext('2d');
    const g = cx.createRadialGradient(64,64,0, 64,64,64);
    g.addColorStop(0, rgba); g.addColorStop(0.12, rgba);
    g.addColorStop(0.5, rgba.replace(/[\d.]+\)$/, '0.15)'));
    g.addColorStop(1, rgba.replace(/[\d.]+\)$/, '0)'));
    cx.fillStyle = g; cx.fillRect(0,0,128,128);
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(cv), blending: THREE.AdditiveBlending,
      transparent: true, depthWrite: false, opacity: op || 0.25
    }));
    s.scale.set(sz, sz, 1); s.position.copy(SUN_POS); return s;
  }

  scene.add(makeGlow('rgba(255,120,30,1)', 20, 0.08));

  // Sun rays
  const rc = document.createElement('canvas'); rc.width = 128; rc.height = 128;
  const rx = rc.getContext('2d');
  for (let i = 0; i < 24; i++) {
    const a = i * Math.PI / 12;
    rx.beginPath(); rx.moveTo(64,64);
    rx.lineTo(64+Math.cos(a)*58, 64+Math.sin(a)*58);
    rx.strokeStyle = 'rgba(255,200,100,0.02)';
    rx.lineWidth = 2+Math.random()*4; rx.stroke();
  }
  const rs = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(rc), blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false, opacity: 0.5
  }));
  rs.scale.set(28, 28, 1); rs.position.copy(SUN_POS); scene.add(rs);

  scene.add(new THREE.AmbientLight(0x111133, 0.08));

  // ── Earth ──────────────────────────────────────────────────
  axisGroup = new THREE.Group(); axisGroup.rotation.x = TILT; scene.add(axisGroup);
  spinGroup = new THREE.Group(); axisGroup.add(spinGroup);
  spinGroup.rotation.y = 2.618; // 150° → China faces camera at (0,0.6,5.9)

  uniforms = {
    dayTex:   { value: fallbackTex('#1a5276') },
    specTex:  { value: fallbackTex('#808080') },
    sunDir:   { value: SUN_POS.clone().normalize() },
    nightCol: { value: new THREE.Color(0x030308) },
  };

  const earthMat = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: earthVS,
    fragmentShader: earthFS,
  });
  spinGroup.add(new THREE.Mesh(new THREE.SphereGeometry(ER, 64, 64), earthMat));

  // ── Axis line ─────────────────────────────────────────────
  {
    const len = ER * 1.4;
    const g = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, -len, 0),
      new THREE.Vector3(0, len, 0)
    ]);
    const mat = new THREE.LineBasicMaterial({
      color: 0xf9d423, transparent: true, opacity: 0.08,
    });
    axisGroup.add(new THREE.Line(g, mat));
  }

  // ── Rotation ring ──────────────────────────────────────────
  {
    const R = ER*1.04, pts = [];
    for (let i = 0; i <= 48; i++) {
      const t = i/48*Math.PI*2;
      pts.push(new THREE.Vector3(R*Math.cos(t), 0, R*Math.sin(t)));
    }
    spinGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color:0xf9d423, transparent:true, opacity:0.12, depthTest:true })
    ));
  }

  // ── Equator ────────────────────────────────────────────────
  {
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const t = i/64*Math.PI*2;
      pts.push(new THREE.Vector3(ER*1.005*Math.cos(t), 0, ER*1.005*Math.sin(t)));
    }
    spinGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color:0xf9d423, transparent:true, opacity:0.06 })
    ));
  }

  // ── Polar circles (Arctic 66.5°N / Antarctic 66.5°S) ────
  function makeLatCircle(latDeg, color, opacity) {
    const r = ER * 1.005;
    const phi = latDeg * Math.PI / 180;
    const y = r * Math.sin(phi);
    const xzR = r * Math.cos(phi);
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const t = i/64*Math.PI*2;
      pts.push(new THREE.Vector3(xzR*Math.cos(t), y, xzR*Math.sin(t)));
    }
    return new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color, transparent:true, opacity })
    );
  }
  spinGroup.add(makeLatCircle(66.5, 0x4fc3f7, 0.12));
  spinGroup.add(makeLatCircle(-66.5, 0x4fc3f7, 0.12));

  // ── City markers ──────────────────────────────────────────
  function ll2p(lat, lng, r) {
    const phi = (lng+180)*Math.PI/180, theta = (90-lat)*Math.PI/180;
    return new THREE.Vector3(
      -r*Math.sin(theta)*Math.cos(phi),
       r*Math.cos(theta),
       r*Math.sin(theta)*Math.sin(phi)
    );
  }
  const DOT_R = 0.035;
  const cityListEl = document.getElementById('cityList');

  // ── Dynamic city management ────────────────────────────────
  let cityIdCounter = 0;
  function nextCityId() { return ++cityIdCounter; }

  function addCityToScene(data) {
    if (cityData.some(d => d.city.name === data.name && d.city.country === data.country)) return;
    const id = nextCityId();
    const pos = ll2p(data.lat, data.lng, ER);

    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(DOT_R, 12, 12),
      new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true })
    );
    dot.position.copy(pos); dot.userData = { isCity:true, id };
    spinGroup.add(dot); cityClick.push(dot);

    const lc = document.createElement('canvas'); lc.width=300; lc.height=72;
    const lx = lc.getContext('2d');
    lx.shadowColor='rgba(0,0,0,0.9)'; lx.shadowBlur=10;
    lx.fillStyle='#fff'; lx.font='bold 28px "Microsoft YaHei","PingFang SC",sans-serif';
    lx.textAlign='center'; lx.textBaseline='middle'; lx.fillText(data.name, 150, 30);
    lx.shadowBlur=4; lx.fillStyle='rgba(255,255,255,0.4)';
    lx.font='14px sans-serif'; lx.fillText(data.country, 150, 58);

    const lbl = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(lc), transparent:true, depthWrite:false, opacity:0.9
    }));
    lbl.position.copy(pos.clone().multiplyScalar(1.24));
    lbl.scale.set(0.7, 0.168, 1); spinGroup.add(lbl);

    const entry = {
      id, pos, dot, lbl, lm: lbl.material, dm: dot.material,
      city: { name: data.name, lat: data.lat, lng: data.lng, country: data.country },
      visible: true, _st: 'night'
    };
    cityData.push(entry);

    const item = document.createElement('div'); item.className='ci'; item.id=`ci-${id}`;
    item.innerHTML = `
      <span class="cd" id="cd-${id}"></span>
      <span class="cn">${data.name}</span>
      <span class="cs" id="cs-${id}">—</span>
      <button class="ci-btn" id="ct-${id}" title="显示/隐藏">👁</button>
      <button class="ci-btn del" id="cdel-${id}" title="删除">✕</button>`;
    item.addEventListener('click', e => {
      const t = e.target;
      if (t.classList.contains('ci-btn')) return;
      focusCityById(id);
    });
    cityListEl.appendChild(item);

    document.getElementById(`ct-${id}`).addEventListener('click', e => { e.stopPropagation(); toggleCityVisibility(id); });
    document.getElementById(`cdel-${id}`).addEventListener('click', e => { e.stopPropagation(); removeCityById(id); });
    return id;
  }

  function removeCityById(id) {
    const idx = cityData.findIndex(d => d.id === id);
    if (idx < 0) return;
    const d = cityData[idx];
    spinGroup.remove(d.dot); spinGroup.remove(d.lbl);
    d.dot.geometry.dispose(); d.dot.material.dispose();
    d.lbl.material.map && d.lbl.material.map.dispose();
    d.lbl.material.dispose();
    const ci = cityClick.indexOf(d.dot);
    if (ci >= 0) cityClick.splice(ci, 1);
    cityData.splice(idx, 1);
    const item = document.getElementById(`ci-${id}`);
    if (item) item.remove();
  }

  function toggleCityVisibility(id) {
    const d = cityData.find(c => c.id === id);
    if (!d) return;
    d.visible = !d.visible;
    document.getElementById(`ct-${id}`)?.classList.toggle('off', !d.visible);
  }

  // Add initial preset cities (hidden by default)
  INITIAL_CITIES.forEach(c => {
    const id = addCityToScene(c);
    // Start hidden
    const d = cityData.find(x => x.id === id);
    if (d) { d.visible = false; document.getElementById(`ct-${id}`)?.classList.add('off'); }
  });

  // ── City panel toggle ──────────────────────────────────────
  let masterVisible = false;
  document.getElementById('cpToggle').addEventListener('click', function() {
    masterVisible = !masterVisible;
    document.getElementById('cpBody').style.display = masterVisible ? 'block' : 'none';
    cityData.forEach(d => {
      d.visible = masterVisible;
      document.getElementById(`ct-${d.id}`)?.classList.toggle('off', !masterVisible);
    });
    this.innerHTML = masterVisible ?
      '📍 城市 · 搜索添加 <span style="float:right">▼</span>' :
      '📍 城市 · 点击展开 <span style="float:right">▶</span>';
  });

  // ── City search ────────────────────────────────────────────
  const citySearchEl = document.getElementById('citySearch');
  const citySearchResultEl = document.getElementById('citySearchResult');
  let searchTimer = null;
  citySearchEl.addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    if (q.length < 1) { citySearchResultEl.innerHTML = ''; return; }
    searchTimer = setTimeout(() => {
      const ql = q.toLowerCase();
      const matches = CITY_DB.filter(c => c.name.toLowerCase().includes(ql) || c.country.toLowerCase().includes(ql)).slice(0, 8);
      const addedNames = new Set(cityData.map(d => d.city.name));
      citySearchResultEl.innerHTML = matches.map(c => {
        const already = addedNames.has(c.name);
        return `<div class="city-sr"><span>${c.name} <small>${c.country}</small></span>${
          already ? '<span style="color:rgba(255,255,255,.2);font-size:11px">已添加</span>' :
          `<button data-name="${c.name}" data-lat="${c.lat}" data-lng="${c.lng}" data-country="${c.country}">+ 添加</button>`
        }</div>`;
      }).join('');
      citySearchResultEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', function() {
          addCityToScene({ name: this.dataset.name, lat: +this.dataset.lat, lng: +this.dataset.lng, country: this.dataset.country });
          citySearchEl.value = '';
          citySearchResultEl.innerHTML = '';
          citySearchEl.focus();
        });
      });
    }, 200);
  });

  document.getElementById('npBtn').addEventListener('click', () => focusPole(true));
  document.getElementById('spBtn').addEventListener('click', () => focusPole(false));

  // ── Focus city ─────────────────────────────────────────────
  function focusCityById(id) {
    const d = cityData.find(c => c.id === id);
    if (!d) return;
    const wp = new THREE.Vector3();
    d.dot.getWorldPosition(wp);
    const dir = wp.clone().normalize();
    const tp = dir.clone().multiplyScalar(4);
    const sp = camera.position.clone(), st = controls.target.clone();
    document.querySelectorAll('.ci').forEach(el => el.style.background = '');
    const item = document.getElementById(`ci-${id}`);
    if (item) item.style.background = 'rgba(249,212,35,0.12)';
    const dur = 800, start = performance.now();
    (function anim(t) {
      const p = Math.min((t-start)/dur, 1), e = p<0.5 ? 2*p*p : -1+(4-2*p)*p;
      camera.position.lerpVectors(sp, tp, e);
      controls.target.lerpVectors(st, wp, e);
      controls.update();
      if (p < 1) requestAnimationFrame(anim);
    })(start);
  }

  // ── Focus pole ─────────────────────────────────────────────
  function focusPole(isNorth) {
    const temp = new THREE.Object3D();
    temp.position.set(0, isNorth ? ER : -ER, 0);
    spinGroup.add(temp);
    const wp = new THREE.Vector3();
    temp.getWorldPosition(wp);
    spinGroup.remove(temp);
    const dir = wp.clone().normalize();
    const tp = dir.clone().multiplyScalar(4);
    const sp = camera.position.clone(), st = controls.target.clone();
    document.querySelectorAll('.ci').forEach(el => el.style.background = '');
    document.querySelectorAll('#npBtn,#spBtn').forEach(el => el.classList.remove('active'));
    document.getElementById(isNorth ? 'npBtn' : 'spBtn').classList.add('active');
    const dur = 800, start = performance.now();
    (function anim(t) {
      const p = Math.min((t-start)/dur, 1), e = p<0.5 ? 2*p*p : -1+(4-2*p)*p;
      camera.position.lerpVectors(sp, tp, e);
      controls.target.lerpVectors(st, wp, e);
      controls.update();
      if (p < 1) requestAnimationFrame(anim);
    })(start);
  }

  // ── Click ─────────────────────────────────────────────────
  renderer.domElement.addEventListener('click', e => {
    const r = renderer.domElement.getBoundingClientRect();
    const px = ((e.clientX-r.left)/r.width)*2-1, py = -((e.clientY-r.top)/r.height)*2+1;
    const rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(px,py), camera);
    const ray = rc.ray;
    let best = Infinity, bi = -1;
    cityClick.forEach(dot => {
      const wp = new THREE.Vector3();
      dot.getWorldPosition(wp);
      const d = ray.distanceSqToPoint(wp);
      if (d < 0.008 && d < best) { best = d; bi = dot.userData.id; }
    });
    if (bi >= 0) focusCityById(bi);
  });

  // ── Status computation ────────────────────────────────────
  function compStatus(sd, d) {
    const wp = new THREE.Vector3();
    d.dot.getWorldPosition(wp);
    const n = wp.normalize(), ca = n.dot(sd);
    // Use local tangent rotation in world space to detect morning/evening
    const localPos = d.pos.clone();
    const eps = 0.005;
    const rxLocal = new THREE.Vector3(
      localPos.x*Math.cos(eps)-localPos.z*Math.sin(eps),
      localPos.y,
      localPos.x*Math.sin(eps)+localPos.z*Math.cos(eps)
    );
    const rxWorld = rxLocal.clone().applyMatrix4(d.dot.matrixWorld).normalize();
    const toward = rxWorld.dot(sd) > ca;
    if (ca > 0.12) return 'day';
    if (ca > 0) return toward ? 'day' : 'dusk';
    if (ca > -0.12) return toward ? 'dawn' : 'night';
    return 'night';
  }

  function updateCities() {
    scene.updateMatrixWorld(true);
    const sd = uniforms.sunDir.value;
    cityData.forEach(d => {
      if (!d.visible) return;
      const st = compStatus(sd, d); d._st = st;
      const de = document.getElementById(`cd-${d.id}`);
      if (de) de.className = `cd ${st}`;

      const iq = new THREE.Quaternion();
      spinGroup.getWorldQuaternion(iq).invert();
      const sl = sd.clone().applyQuaternion(iq);
      const noon = Math.atan2(sl.z, sl.x) * 180 / Math.PI;
      let diff = ((d.city.lng - noon) % 360 + 540) % 360 - 180;
      const lh = (12 + diff/15 + 24) % 24;
      const hh = Math.floor(lh), mm = Math.floor((lh-hh)*60);
      const ts = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
      const span = document.getElementById(`cs-${d.id}`);
      if (span) {
        const lbl = { day:'☀白天', night:'🌙夜晚', dawn:'🌅黎明', dusk:'🌇黄昏' };
        span.innerHTML = `${lbl[st]||'—'} <span style="opacity:0.35;font-size:10px">${ts}</span>`;
      }
      const col = { day:0xf9d423, night:0x1a1a3e, dawn:0xff6b35, dusk:0xe74c3c };
      d.dm.color.setHex(col[st]||0xffffff);
      d.lm.opacity = { day:1, night:0.25, dawn:1, dusk:0.65 }[st] || 0.9;
    });
  }

  // ── Load textures ─────────────────────────────────────────
  setLoad('加载纹理…', '使用本地高清贴图');
  let loadTimer = setTimeout(() => document.getElementById('loading').classList.add('hidden'), 6000);

  (async () => {
    try {
      const [earthImg, specImg, sunImg] = await Promise.all([
        loadImgEl('texEarthDay').catch(()=>null),
        loadImgEl('texEarthSpec').catch(()=>null),
        loadImgEl('texSun').catch(()=>null),
      ]);
      console.log('tex: earth=%s spec=%s sun=%s',
        earthImg?'✅':'❌', specImg?'✅':'❌', sunImg?'✅':'❌');

      if (earthImg) {
        const t = new THREE.Texture(earthImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        uniforms.dayTex.value = t;
      }
      if (specImg) {
        const t = new THREE.Texture(specImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        uniforms.specTex.value = t;
      }
      if (sunImg) {
        const t = new THREE.Texture(sunImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        sunMat.map = t; sunMat.needsUpdate = true;
      }
    } catch(e) { console.warn('tex load error:', e); }
    clearTimeout(loadTimer);
    document.getElementById('loading').classList.add('hidden');
  })();

  // ── Animation loop ────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = performance.now() / 1000;

    if (!paused) {
      spinGroup.rotation.y += BASE_SPEED * speedMul * dt * rotDir;
    }

    if (!cityData._lu || t - cityData._lu > 0.2) {
      updateCities(); cityData._lu = t;
    }

    cityData.forEach(d => {
      if (!d.visible) {
        d.dm.opacity = 0; d.dot.scale.setScalar(0);
        d.lm.opacity = 0; return;
      }
      if (d._st === 'dawn') {
        const p = 0.5 + 0.5 * Math.sin(t*3 + d.id*0.7);
        d.dm.opacity = p; d.dot.scale.setScalar(0.7 + 0.3*p);
      } else if (d._st === 'dusk') {
        const p = 0.4 + 0.3 * Math.sin(t*2 + d.id*1.3);
        d.dm.opacity = p; d.dot.scale.setScalar(1);
      } else if (d._st === 'day') {
        d.dm.opacity = 1; d.dot.scale.setScalar(1);
      } else {
        d.dm.opacity = 0.35; d.dot.scale.setScalar(0.65);
      }
    });

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── UI ────────────────────────────────────────────────────
  document.getElementById('spd').addEventListener('input', function() {
    speedMul = parseFloat(this.value);
    document.getElementById('spdVal').textContent = speedMul.toFixed(1) + '×';
  });
  document.getElementById('pauseBtn').addEventListener('click', function() {
    paused = !paused;
    this.textContent = paused ? '▶ 播放' : '⏸ 暂停';
    this.classList.toggle('active', paused);
  });
  document.getElementById('dirBtn').addEventListener('click', function() {
    rotDir *= -1;
    this.textContent = rotDir === 1 ? '↺ 自西向东' : '↻ 自东向西';
    this.classList.toggle('active', rotDir === -1);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    camera.position.set(0, 0.5, 5.9);
    controls.target.set(0,0,0); controls.update();
    spinGroup.rotation.y = 2.618;
    document.querySelectorAll('.ci').forEach(el => el.style.background = '');
    document.querySelectorAll('#npBtn,#spBtn').forEach(el => el.classList.remove('active'));
  });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  window.addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); document.getElementById('pauseBtn').click(); }
  });

  console.log('🌍 Earth day/night demo started');
} catch(e) {
  console.error('Init error:', e);
  showErr('初始化失败：'+(e.message||e));
}
</script>
</body>
</html>
