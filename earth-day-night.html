<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>地球昼夜交替 3D 演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Microsoft YaHei','PingFang SC',system-ui,-apple-system,sans-serif;color:#fff;user-select:none}
canvas{display:block}
#topBar{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:18px;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);padding:8px 20px;border-radius:14px;border:1px solid rgba(255,255,255,.07);z-index:10;pointer-events:auto}
#topBar h1{font-size:15px;font-weight:600;white-space:nowrap;background:linear-gradient(90deg,#f9d423,#ff4e50);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
#topBar .cg{display:flex;align-items:center;gap:8px}
#topBar label{font-size:12px;color:rgba(255,255,255,.5);white-space:nowrap}
#topBar input[type=range]{width:76px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;outline:none}
#topBar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#f9d423;cursor:pointer}
#topBar button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;padding:4px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s;font-family:inherit}
#topBar button:hover{background:rgba(255,255,255,.16)}
#topBar button.active{background:rgba(249,212,35,.22);border-color:#f9d423}
#topBar .sv{font-size:13px;color:#f9d423;min-width:28px;text-align:center}
#cityPanel{position:fixed;left:16px;bottom:16px;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;min-width:200px;z-index:10;pointer-events:auto}
#cityPanel .pt{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px;letter-spacing:.5px}
.ci{display:flex;align-items:center;gap:10px;padding:5px 4px;font-size:13px;border-radius:4px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.ci:last-child{border-bottom:none}
.ci:hover{background:rgba(255,255,255,.07)}
.ci:active{background:rgba(249,212,35,.12)}
.cd{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.cd.day{background:#f9d423;box-shadow:0 0 8px rgba(249,212,35,.5)}
.cd.night{background:#1a1a3e;border-color:rgba(255,255,255,.1)}
.cd.dawn{background:#ff6b35;box-shadow:0 0 10px rgba(255,107,53,.7)}
.cd.dusk{background:#e74c3c;box-shadow:0 0 6px rgba(231,76,60,.4)}
.cn{min-width:52px}
.cs{font-size:11px;color:rgba(255,255,255,.45);margin-left:auto;white-space:nowrap}
#infoBox{position:fixed;right:16px;bottom:16px;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;max-width:230px;z-index:10;font-size:12px;line-height:1.7;color:rgba(255,255,255,.65);pointer-events:auto}
#infoBox strong{color:rgba(255,255,255,.9)}
#infoBox .hl{color:#f9d423}
#loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.06);border-top-color:#f9d423;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:16px;color:rgba(255,255,255,.4);font-size:14px}
#loading .sub{color:rgba(255,255,255,.2);font-size:12px;margin-top:6px}
#errMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:rgba(0,0,0,.9);backdrop-filter:blur(14px);border:1px solid rgba(255,80,80,.25);border-radius:14px;padding:28px 36px;max-width:460px;text-align:center;display:none}
#errMsg h2{color:#ff6b35;font-size:18px;margin-bottom:10px}
#errMsg p{color:rgba(255,255,255,.55);font-size:13px;line-height:1.6}
#errMsg .rb{margin-top:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;transition:.2s}
#errMsg .rb:hover{background:rgba(255,255,255,.2)}
@media(max-width:720px){
#topBar{top:8px;padding:6px 12px;gap:10px;flex-wrap:wrap;justify-content:center}
#topBar h1{font-size:13px}
#topBar input[type=range]{width:50px}
#cityPanel{left:8px;bottom:8px;padding:10px 12px;min-width:155px}
#cityPanel .ci{font-size:12px}
#infoBox{display:none}
}
</style>
</head>
<body>

<img id="texEarthDay" src="textures/earth_atmos_2048.jpg" style="display:none">
<img id="texEarthSpec" src="textures/earth_specular_2048.jpg" style="display:none">
<img id="texEarthCloud" src="textures/earth_clouds_1024.png" style="display:none">
<img id="texSun" src="textures/sun_2k.jpg" style="display:none">

<div id="loading">
  <div class="spinner"></div>
  <p id="loadText">加载 3D 引擎…</p>
  <div class="sub" id="loadSub"></div>
</div>

<div id="errMsg">
  <h2>⚠️ 加载失败</h2>
  <p id="errText">无法加载，请检查网络后刷新。</p>
  <button class="rb" onclick="location.reload()">刷新重试</button>
</div>

<div id="topBar">
  <h1>🌍 地球昼夜交替</h1>
  <div class="cg">
    <label>速度</label>
    <input type="range" id="spd" min="0" max="5" step="0.25" value="1">
    <span class="sv" id="spdVal">1×</span>
  </div>
  <button id="pauseBtn">⏸ 暂停</button>
  <button id="resetBtn">⟲ 重置视角</button>
</div>

<div id="cityPanel">
  <div class="pt">📍 城市日照 · 点击聚焦</div>
  <div id="cityList"></div>
</div>

<div id="infoBox">
  <div><strong>操作提示</strong></div>
  <div>🖱 拖拽 · 滚轮缩放 · 点击城市</div>
  <div style="margin-top:6px">地球自<span class="hl">西</span>向<span class="hl">东</span>转动 → 太阳东升西落<br><span class="hl">黎明</span>从东方开始</div>
  <div style="margin-top:6px;font-size:11px;color:rgba(255,255,255,.35)">●白天 ●夜晚 ●黎明 ●黄昏</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
// ── Error handling ─────────────────────────────────────────
function showErr(m){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('errText').textContent = m || '未知错误，请刷新重试';
  document.getElementById('errMsg').style.display = 'block';
}
window.addEventListener('unhandledrejection', e => showErr('加载失败：'+(e.reason?.message||'')));
function setLoad(t, s) {
  const a = document.getElementById('loadText'); if(a) a.textContent = t;
  const b = document.getElementById('loadSub');  if(b && s) b.textContent = s;
}

// ── Imports ────────────────────────────────────────────────
let THREE, OrbitControls;
try {
  const m = await import('three'); THREE = m.default || m;
  const c = await import('three/addons/controls/OrbitControls.js'); OrbitControls = c.OrbitControls;
} catch(e) { showErr('3D引擎加载失败（'+e.message+'）'); throw e; }

setLoad('初始化场景…');

// ── Config ─────────────────────────────────────────────────
const CITIES = [
  {name:'东京', lat:35.7, lng:139.7, country:'日本'},
  {name:'北京', lat:39.9, lng:116.4, country:'中国'},
  {name:'上海', lat:31.2, lng:121.5, country:'中国'},
  {name:'悉尼', lat:-33.9, lng:151.2, country:'澳大利亚'},
  {name:'伦敦', lat:51.5, lng:-0.1,  country:'英国'},
  {name:'纽约', lat:40.7, lng:-74.0, country:'美国'},
];
const ER = 1.8, SUN_D = 8, TILT = 23.44 * Math.PI / 180;
const SUN_POS = new THREE.Vector3(5.5, 3.8, 5).normalize().multiplyScalar(SUN_D);

// ── Texture helpers ────────────────────────────────────────
function loadImgEl(id) {
  const el = document.getElementById(id);
  if (!el) return Promise.reject('no element');
  if (el.complete && el.naturalWidth > 0) return Promise.resolve(el);
  return el.decode().then(() => el).catch(() => null);
}
function fallbackTex(color) {
  const c = document.createElement('canvas'); c.width = 4; c.height = 4;
  const x = c.getContext('2d'); x.fillStyle = color; x.fillRect(0,0,4,4);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

// ── Shaders (WebGL2 compatible — use `texture` not `texture2D`) ──
const earthVS = `
  varying vec3 vNormal;
  varying vec2 vUv;
  void main() {
    vUv = uv;
    vNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const earthFS = `
  uniform sampler2D dayTex;
  uniform sampler2D specTex;
  uniform vec3 sunDir;
  uniform vec3 nightCol;

  varying vec3 vNormal;
  varying vec2 vUv;

  void main() {
    vec3 N = normalize(vNormal);
    float ca = dot(N, normalize(sunDir));

    // Day/night blend
    float dayFactor = smoothstep(-0.08, 0.08, ca);

    vec3 texColor = texture(dayTex, vUv).rgb;
    float specVal = texture(specTex, vUv).r;

    // Day side
    vec3 dayCol = texColor * (0.85 + 0.35 * specVal);

    // Night side
    vec3 nightColOut = nightCol + texColor * 0.035;
    nightColOut += vec3(0.15, 0.12, 0.05) * max(0.0, 1.0 - specVal - 0.5) * 0.12;

    vec3 color = mix(nightColOut, dayCol, dayFactor);

    // Terminator glow
    float glow = clamp(1.0 - abs(ca) * 14.0, 0.0, 1.0);
    glow = glow * glow;
    vec3 glowCol = mix(
      vec3(1.0, 0.5, 0.15),
      vec3(1.0, 0.25, 0.08),
      smoothstep(-0.08, 0.08, ca)
    );
    color += glowCol * glow * 0.4;

    // Atmosphere rim
    float rim = pow(1.0 - abs(ca), 2.0);
    color += vec3(0.15, 0.4, 0.85) * rim * 0.04;

    gl_FragColor = vec4(color, 1.0);
  }
`;

const cloudFS = `
  uniform sampler2D tex;
  uniform vec3 sunDir;
  varying vec3 vNormal;
  varying vec2 vUv;

  void main() {
    vec3 N = normalize(vNormal);
    float ca = dot(N, normalize(sunDir));
    float day = smoothstep(-0.15, 0.15, ca);
    float alpha = texture(tex, vUv).a * day * 0.7;
    gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
  }
`;

const atmoVS = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main() {
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vNormal = normalize(normalMatrix * normal);
    vViewDir = normalize(-mvPos.xyz);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const atmoFS = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main() {
    float rim = 1.0 - max(0.0, dot(vNormal, vViewDir));
    rim = pow(rim, 3.0);
    gl_FragColor = vec4(0.3, 0.6, 1.0, rim * 0.18);
  }
`;

const atmoOuterFS = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main() {
    float rim = 1.0 - max(0.0, dot(vNormal, vViewDir));
    rim = pow(rim, 4.0);
    gl_FragColor = vec4(0.2, 0.5, 0.9, rim * 0.06);
  }
`;

// ── Scene ──────────────────────────────────────────────────
let scene, camera, renderer, controls, earthGroup, tiltGroup, uniforms;
let cloudGroup = null;
let cityData = [], cityClick = [];
let paused = false, speedMul = 1;
const BASE_SPEED = 0.6;
const clock = new THREE.Clock();

try {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(1.2, 1.0, 5.8);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  if (renderer.capabilities && renderer.capabilities.isWebGL2) {
    console.log('WebGL2 context');
  }
  renderer.toneMapping = THREE.ACESFilmicToneMapping || THREE.NoToneMapping;
  renderer.toneMappingExposure = 0.85;
  document.body.prepend(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 2.6; controls.maxDistance = 14;
  controls.target.set(0, 0, 0); controls.update();

  // ── Sun ──────────────────────────────────────────────────
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 24), sunMat);
  sunMesh.position.copy(SUN_POS); scene.add(sunMesh);

  // Sun glow canvas
  function makeGlow(rgba, sz, op) {
    const cv = document.createElement('canvas'); cv.width = 128; cv.height = 128;
    const cx = cv.getContext('2d');
    const g = cx.createRadialGradient(64,64,0, 64,64,64);
    g.addColorStop(0, rgba); g.addColorStop(0.12, rgba);
    g.addColorStop(0.5, rgba.replace(/[\d.]+\)$/, '0.15)'));
    g.addColorStop(1, rgba.replace(/[\d.]+\)$/, '0)'));
    cx.fillStyle = g; cx.fillRect(0,0,128,128);
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(cv), blending: THREE.AdditiveBlending,
      transparent: true, depthWrite: false, opacity: op || 0.25
    }));
    s.scale.set(sz, sz, 1); s.position.copy(SUN_POS); return s;
  }
  scene.add(makeGlow('rgba(255,220,80,1)', 6, 0.4));
  scene.add(makeGlow('rgba(255,180,50,1)', 12, 0.22));
  scene.add(makeGlow('rgba(255,120,30,1)', 20, 0.08));

  // Sun rays
  const rc = document.createElement('canvas'); rc.width = 128; rc.height = 128;
  const rx = rc.getContext('2d');
  for (let i = 0; i < 24; i++) {
    const a = i * Math.PI / 12;
    rx.beginPath(); rx.moveTo(64,64);
    rx.lineTo(64+Math.cos(a)*58, 64+Math.sin(a)*58);
    rx.strokeStyle = 'rgba(255,200,100,0.02)';
    rx.lineWidth = 2+Math.random()*4; rx.stroke();
  }
  const rs = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(rc), blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false, opacity: 0.5
  }));
  rs.scale.set(28, 28, 1); rs.position.copy(SUN_POS); scene.add(rs);

  scene.add(new THREE.AmbientLight(0x111133, 0.08));

  // ── Earth ──────────────────────────────────────────────────
  earthGroup = new THREE.Group(); scene.add(earthGroup);
  tiltGroup = new THREE.Group(); tiltGroup.rotation.x = TILT; earthGroup.add(tiltGroup);

  uniforms = {
    dayTex:   { value: fallbackTex('#1a5276') },
    specTex:  { value: fallbackTex('#808080') },
    sunDir:   { value: SUN_POS.clone().normalize() },
    nightCol: { value: new THREE.Color(0x030308) },
  };

  const earthMat = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: earthVS,
    fragmentShader: earthFS,
  });
  tiltGroup.add(new THREE.Mesh(new THREE.SphereGeometry(ER, 64, 64), earthMat));

  // ── Atmosphere ─────────────────────────────────────────────
  const makeAtmo = (radius, fs, op) => {
    const m = new THREE.ShaderMaterial({
      vertexShader: atmoVS, fragmentShader: fs,
      transparent: true, side: THREE.FrontSide,
      depthWrite: false, blending: THREE.AdditiveBlending,
    });
    tiltGroup.add(new THREE.Mesh(new THREE.SphereGeometry(radius, 48, 48), m));
  };
  makeAtmo(ER*1.015, atmoFS);
  makeAtmo(ER*1.03, atmoOuterFS);

  // ── Rotation ring ──────────────────────────────────────────
  {
    const g = new THREE.Group(), R = ER*1.04, pts = [];
    for (let i = 0; i <= 48; i++) {
      const t = i/48*Math.PI*2;
      pts.push(new THREE.Vector3(R*Math.cos(t), 0, R*Math.sin(t)));
    }
    g.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color:0xf9d423, transparent:true, opacity:0.12, depthTest:true })
    ));
    for (let i = 0; i < 12; i++) {
      const t = i/12*Math.PI*2, x = R*Math.cos(t), z = R*Math.sin(t);
      const c = new THREE.Mesh(
        new THREE.ConeGeometry(0.025, 0.06, 6),
        new THREE.MeshBasicMaterial({ color:0xf9d423, transparent:true, opacity:0.25 })
      );
      c.position.set(x,0,z);
      c.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(-z,0,x).normalize());
      g.add(c);
    }
    tiltGroup.add(g);
  }

  // ── Equator ────────────────────────────────────────────────
  {
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const t = i/64*Math.PI*2;
      pts.push(new THREE.Vector3(ER*1.005*Math.cos(t), 0, ER*1.005*Math.sin(t)));
    }
    tiltGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color:0xf9d423, transparent:true, opacity:0.06 })
    ));
  }

  // ── City markers ──────────────────────────────────────────
  function ll2p(lat, lng, r) {
    const phi = (lng+180)*Math.PI/180, theta = (90-lat)*Math.PI/180;
    return new THREE.Vector3(
      -r*Math.sin(theta)*Math.cos(phi),
       r*Math.cos(theta),
       r*Math.sin(theta)*Math.sin(phi)
    );
  }
  const DOT_R = 0.035;
  const cityListEl = document.getElementById('cityList');

  CITIES.forEach((city, i) => {
    const pos = ll2p(city.lat, city.lng, ER);

    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(DOT_R, 12, 12),
      new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true })
    );
    dot.position.copy(pos); dot.userData = { isCity:true, idx:i };
    tiltGroup.add(dot); cityClick.push(dot);

    const ring = new THREE.Mesh(
      new THREE.RingGeometry(DOT_R*1.8, DOT_R*3, 20),
      new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.4, side:THREE.DoubleSide, depthWrite:false })
    );
    ring.position.copy(pos); ring.lookAt(0,0,0); tiltGroup.add(ring);

    // Label canvas
    const lc = document.createElement('canvas'); lc.width=300; lc.height=72;
    const lx = lc.getContext('2d');
    lx.shadowColor='rgba(0,0,0,0.9)'; lx.shadowBlur=10;
    lx.fillStyle='#fff'; lx.font='bold 28px "Microsoft YaHei","PingFang SC",sans-serif';
    lx.textAlign='center'; lx.textBaseline='middle'; lx.fillText(city.name, 150, 30);
    lx.shadowBlur=4; lx.fillStyle='rgba(255,255,255,0.4)';
    lx.font='14px sans-serif'; lx.fillText(city.country, 150, 58);

    const lbl = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(lc), transparent:true, depthWrite:false, opacity:0.9
    }));
    lbl.position.copy(pos.clone().multiplyScalar(1.24));
    lbl.scale.set(0.7, 0.168, 1); tiltGroup.add(lbl);

    cityData.push({
      pos, dot, ring, lbl, lm: lbl.material, dm: dot.material,
      city, index: i, _st: 'night'
    });

    const item = document.createElement('div'); item.className='ci'; item.id=`ci-${i}`;
    item.innerHTML = `<span class="cd" id="cd-${i}"></span><span class="cn">${city.name}</span><span class="cs" id="cs-${i}">—</span>`;
    item.addEventListener('click', () => focusCity(i));
    cityListEl.appendChild(item);
  });

  // ── Focus city ─────────────────────────────────────────────
  function focusCity(idx) {
    if (!cityData[idx]) return;
    const wp = new THREE.Vector3();
    cityData[idx].dot.getWorldPosition(wp);
    const dir = wp.clone().normalize();
    const tp = dir.clone().multiplyScalar(4);
    const sp = camera.position.clone(), st = controls.target.clone();
    document.querySelectorAll('.ci').forEach(el => el.style.background = '');
    const item = document.getElementById(`ci-${idx}`);
    if (item) item.style.background = 'rgba(249,212,35,0.12)';
    const dur = 800, start = performance.now();
    (function anim(t) {
      const p = Math.min((t-start)/dur, 1), e = p<0.5 ? 2*p*p : -1+(4-2*p)*p;
      camera.position.lerpVectors(sp, tp, e);
      controls.target.lerpVectors(st, wp, e);
      controls.update();
      if (p < 1) requestAnimationFrame(anim);
    })(start);
  }

  // ── Click ─────────────────────────────────────────────────
  renderer.domElement.addEventListener('click', e => {
    const r = renderer.domElement.getBoundingClientRect();
    const px = ((e.clientX-r.left)/r.width)*2-1, py = -((e.clientY-r.top)/r.height)*2+1;
    const rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(px,py), camera);
    const ray = rc.ray;
    let best = Infinity, bi = -1;
    cityClick.forEach(dot => {
      const wp = new THREE.Vector3();
      dot.getWorldPosition(wp);
      const d = ray.distanceSqToPoint(wp);
      if (d < 0.008 && d < best) { best = d; bi = dot.userData.idx; }
    });
    if (bi >= 0) focusCity(bi);
  });

  // ── Status computation ────────────────────────────────────
  function compStatus(sd, d) {
    const n = d.pos.clone().normalize(), ca = n.dot(sd);
    const eps = 0.005, {x,y,z} = d.pos;
    const rx = new THREE.Vector3(
      x*Math.cos(eps)-z*Math.sin(eps), y, x*Math.sin(eps)+z*Math.cos(eps)
    ).normalize();
    const toward = rx.dot(sd) > ca;
    if (ca > 0.12) return 'day';
    if (ca > 0) return toward ? 'day' : 'dusk';
    if (ca > -0.12) return toward ? 'dawn' : 'night';
    return 'night';
  }

  function updateCities() {
    const sd = uniforms.sunDir.value;
    cityData.forEach(d => {
      const st = compStatus(sd, d); d._st = st;
      const de = document.getElementById(`cd-${d.index}`);
      if (de) de.className = `cd ${st}`;

      const iq = new THREE.Quaternion().copy(earthGroup.quaternion).invert();
      const sl = sd.clone().applyQuaternion(iq)
        .applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), -TILT));
      const noon = Math.atan2(sl.z, sl.x) * 180 / Math.PI;
      let diff = ((d.city.lng - noon) % 360 + 540) % 360 - 180;
      const lh = (12 + diff/15 + 24) % 24;
      const hh = Math.floor(lh), mm = Math.floor((lh-hh)*60);
      const ts = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
      const span = document.getElementById(`cs-${d.index}`);
      if (span) {
        const lbl = { day:'☀白天', night:'🌙夜晚', dawn:'🌅黎明', dusk:'🌇黄昏' };
        span.innerHTML = `${lbl[st]||'—'} <span style="opacity:0.35;font-size:10px">${ts}</span>`;
      }
      const col = { day:0xf9d423, night:0x1a1a3e, dawn:0xff6b35, dusk:0xe74c3c };
      d.dm.color.setHex(col[st]||0xffffff);
      d.ring.material.color.setHex(col[st]||0xffffff);
      d.lm.opacity = { day:1, night:0.25, dawn:1, dusk:0.65 }[st] || 0.9;
    });
  }

  // ── Load textures ─────────────────────────────────────────
  setLoad('加载纹理…', '使用本地高清贴图');
  let loadTimer = setTimeout(() => document.getElementById('loading').classList.add('hidden'), 6000);

  (async () => {
    try {
      const [earthImg, specImg, sunImg, cloudImg] = await Promise.all([
        loadImgEl('texEarthDay').catch(()=>null),
        loadImgEl('texEarthSpec').catch(()=>null),
        loadImgEl('texSun').catch(()=>null),
        loadImgEl('texEarthCloud').catch(()=>null),
      ]);
      console.log('tex: earth=%s spec=%s sun=%s cloud=%s',
        earthImg?'✅':'❌', specImg?'✅':'❌', sunImg?'✅':'❌', cloudImg?'✅':'❌');

      if (earthImg) {
        const t = new THREE.Texture(earthImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        uniforms.dayTex.value = t;
      }
      if (specImg) {
        const t = new THREE.Texture(specImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        uniforms.specTex.value = t;
      }
      if (sunImg) {
        const t = new THREE.Texture(sunImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        sunMat.map = t; sunMat.needsUpdate = true;
      }
      if (cloudImg) {
        const t = new THREE.Texture(cloudImg);
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
        cloudGroup = new THREE.Group(); cloudGroup.rotation.x = TILT;
        earthGroup.add(cloudGroup);
        cloudGroup.add(new THREE.Mesh(
          new THREE.SphereGeometry(ER*1.015, 48, 48),
          new THREE.ShaderMaterial({
            uniforms: { tex: {value:t}, sunDir: {value:SUN_POS.clone().normalize()} },
            vertexShader: earthVS, fragmentShader: cloudFS,
            transparent: true, depthWrite: false,
          })
        ));
      }
    } catch(e) { console.warn('tex load error:', e); }
    clearTimeout(loadTimer);
    document.getElementById('loading').classList.add('hidden');
  })();

  // ── Animation loop ────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta(), t = performance.now() / 1000;

    if (!paused) {
      earthGroup.rotation.y += BASE_SPEED * speedMul * dt;
      if (cloudGroup) cloudGroup.rotation.y += BASE_SPEED * speedMul * dt * 1.03;
    }

    if (!cityData._lu || t - cityData._lu > 0.2) {
      updateCities(); cityData._lu = t;
    }

    cityData.forEach(d => {
      if (d._st === 'dawn') {
        const p = 0.5 + 0.5 * Math.sin(t*3 + d.index*1.5);
        d.dm.opacity = p; d.dot.scale.setScalar(0.7 + 0.3*p);
        d.ring.material.opacity = p * 0.5;
      } else if (d._st === 'dusk') {
        const p = 0.4 + 0.3 * Math.sin(t*2 + d.index*2);
        d.dm.opacity = p; d.dot.scale.setScalar(1);
        d.ring.material.opacity = 0.2 + 0.2*p;
      } else if (d._st === 'day') {
        d.dm.opacity = 1; d.dot.scale.setScalar(1);
        d.ring.material.opacity = 0.4;
      } else {
        d.dm.opacity = 0.35; d.dot.scale.setScalar(0.65);
        d.ring.material.opacity = 0.12;
      }
    });

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── UI ────────────────────────────────────────────────────
  document.getElementById('spd').addEventListener('input', function() {
    speedMul = parseFloat(this.value);
    document.getElementById('spdVal').textContent = speedMul.toFixed(1) + '×';
  });
  document.getElementById('pauseBtn').addEventListener('click', function() {
    paused = !paused;
    this.textContent = paused ? '▶ 播放' : '⏸ 暂停';
    this.classList.toggle('active', paused);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    camera.position.set(1.2, 1.0, 5.8);
    controls.target.set(0,0,0); controls.update();
    document.querySelectorAll('.ci').forEach(el => el.style.background = '');
  });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  window.addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); document.getElementById('pauseBtn').click(); }
  });

  console.log('🌍 Earth day/night demo started');
} catch(e) {
  console.error('Init error:', e);
  showErr('初始化失败：'+(e.message||e));
}
</script>
</body>
</html>
